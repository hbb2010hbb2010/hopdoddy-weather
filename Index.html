<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hopdoddy Weather Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,wght@0,300;0,500;1,300;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0f0e0c;
  --paper: #f7f5f0;
  --warm-mid: #eceae4;
  --warm-border: #d8d4cb;
  --accent: #c8531a;
  --accent-light: #f7ede6;
  --green: #1a6640;
  --green-light: #e4f0e9;
  --red: #9e2020;
  --red-light: #f5e4e4;
  --neutral: #5e5a54;
  --neutral-light: #eeecea;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', Georgia, serif;
}
body { font-family: var(--mono); background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 13px; line-height: 1.5; }

/* MASTHEAD */
.masthead { background: #1B4332; color: var(--paper); padding: 0 32px; display: flex; align-items: stretch; justify-content: space-between; border-bottom: 3px solid #2D6A4F; }
.masthead-left { padding: 18px 0; }
.eyebrow { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
.masthead-title { font-family: var(--serif); font-size: 24px; font-weight: 300; color: #ffffff; }
.masthead-title em { font-style: italic; color: #e8c56a; }
.masthead-right { display: flex; align-items: center; gap: 0; }
.mstat { padding: 0 24px; text-align: center; border-left: 1px solid #2D6A4F; }
.mstat:last-child { border-right: 1px solid #2D6A4F; }
.mstat-num { font-family: var(--serif); font-size: 28px; font-weight: 300; line-height: 1; }
.mstat-num.up { color: #ffffff; }
.mstat-num.down { color: #ffffff; }
.mstat-num.gold { color: #ffffff; }
.mstat-label { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 3px; }

/* DATE SELECTOR */
.date-panel { background: #fff; border-bottom: 1px solid var(--warm-border); padding: 14px 32px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.panel-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--neutral); flex-shrink: 0; }
.quick-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 5px 13px; border: 1px solid var(--warm-border); border-radius: 2px;
  background: transparent; cursor: pointer; font-family: var(--mono); font-size: 10px;
  color: var(--neutral); transition: all 0.12s; white-space: nowrap; letter-spacing: 0.3px;
}
.chip:hover { border-color: var(--ink); color: var(--ink); }
.chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.divider-v { width: 1px; height: 28px; background: var(--warm-border); flex-shrink: 0; }
.custom-date-wrap { display: flex; align-items: center; gap: 8px; }
.custom-date-wrap input[type="date"] {
  font-family: var(--mono); font-size: 10px; border: 1px solid var(--warm-border);
  border-radius: 2px; padding: 5px 10px; background: transparent; color: var(--ink); cursor: pointer;
}
.custom-date-wrap input[type="date"]:focus { outline: none; border-color: var(--ink); }
.add-btn {
  padding: 5px 13px; background: var(--accent); color: #fff; border: none;
  border-radius: 2px; font-family: var(--mono); font-size: 10px; cursor: pointer; transition: background 0.12s;
}
.add-btn:hover { background: #a84315; }
.clear-all-btn {
  margin-left: auto; padding: 5px 12px; background: transparent; color: #aaa;
  border: 1px solid var(--warm-border); border-radius: 2px; font-family: var(--mono);
  font-size: 9px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.12s;
}
.clear-all-btn:hover { border-color: var(--red); color: var(--red); }

/* SELECTED DATES TAGS */
.selected-dates-bar { display: none !important; }
.selected-dates-bar.empty { display: none; }
.date-tag {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: #fff; border: 1px solid var(--warm-border); border-radius: 2px;
  font-family: var(--mono); font-size: 10px; color: var(--ink);
}
.date-tag.loading { border-color: var(--accent); color: var(--accent); }
.date-tag.done-up { border-color: var(--green); }
.date-tag.done-down { border-color: var(--red); }
.date-tag .remove-tag { cursor: pointer; color: #bbb; font-size: 12px; line-height: 1; margin-left: 2px; }
.date-tag .remove-tag:hover { color: var(--red); }
.date-tag .tag-badges { display: flex; gap: 4px; }
.tag-up { font-size: 9px; background: var(--green-light); color: var(--green); padding: 1px 5px; border-radius: 2px; }
.tag-down { font-size: 9px; background: var(--red-light); color: var(--red); padding: 1px 5px; border-radius: 2px; }

/* TOOLBAR */
.toolbar { background: var(--paper); padding: 10px 32px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.toolbar-row1 { border-bottom: none; padding-bottom: 4px; }
.toolbar-row2 { border-bottom: 1px solid var(--warm-border); padding-top: 4px; }
.market-pills { display: flex; gap: 5px; flex-wrap: wrap; }
.mpill {
  padding: 4px 11px; border: 1px solid var(--warm-border); border-radius: 20px;
  background: transparent; cursor: pointer; font-family: var(--mono); font-size: 10px;
  color: var(--neutral); transition: all 0.12s;
}
.mpill:hover { border-color: var(--ink); color: var(--ink); }
.mpill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.view-toggle { display: flex; gap: 0; margin-left: auto; border: 1px solid var(--warm-border); border-radius: 2px; overflow: hidden; }
.vtoggle {
  padding: 5px 12px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.5px;
  text-transform: uppercase; background: transparent; border: none; cursor: pointer;
  color: var(--neutral); border-right: 1px solid var(--warm-border); transition: all 0.12s;
}
.vtoggle:last-child { border-right: none; }
.vtoggle.active { background: var(--ink); color: var(--paper); }
.refresh-btn {
  padding: 5px 14px; background: var(--accent-light); border: 1px solid var(--accent);
  border-radius: 2px; font-family: var(--mono); font-size: 10px; color: var(--accent);
  cursor: pointer; transition: all 0.12s; letter-spacing: 0.3px;
}
.refresh-btn:hover { background: var(--accent); color: #fff; }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* PROGRESS */
.progress-track { height: 2px; background: var(--warm-mid); }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.2s; width: 0%; }

/* SCOREBOARD */

/* DAY TABS */
.day-tabs-wrap { display: none !important; }
.day-tabs-wrap:empty, .day-tabs-wrap.hidden { display: none; }
.day-tab {
  padding: 10px 18px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.3px;
  color: var(--neutral); cursor: pointer; border: none; background: transparent;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.12s;
  display: flex; align-items: center; gap: 7px;
}
.day-tab:hover { color: var(--ink); }
.day-tab.active { color: var(--ink); border-bottom: 2px solid var(--ink); background: var(--paper); }
.tab-pill { font-size: 9px; padding: 1px 5px; border-radius: 2px; }
.tab-up { background: var(--green-light); color: var(--green); }
.tab-down { background: var(--red-light); color: var(--red); }

/* CONTENT */
.content { padding: 24px 32px; }
.empty-prompt { text-align: center; padding: 80px 20px; }
.empty-prompt-icon { font-family: var(--serif); font-size: 48px; font-weight: 300; font-style: italic; color: var(--warm-border); margin-bottom: 16px; }
.empty-prompt-text { font-size: 12px; color: #bbb; letter-spacing: 0.5px; }
.empty-prompt-text strong { color: var(--neutral); font-weight: 400; }

.loading-state { display: flex; align-items: center; justify-content: center; padding: 80px 20px; flex-direction: column; gap: 12px; color: #aaa; }
.spinner { width: 22px; height: 22px; border: 2px solid var(--warm-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.section-block { margin-bottom: 28px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--warm-border); }
.section-eye { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; }
.section-eye.up { color: var(--green); }
.section-eye.down { color: var(--red); }
.section-eye.neut { color: var(--neutral); }
.section-count { font-family: var(--serif); font-size: 15px; font-weight: 300; padding: 1px 8px; border-radius: 2px; }
.section-count.up { background: var(--green-light); color: var(--green); }
.section-count.down { background: var(--red-light); color: var(--red); }
.section-count.neut { background: var(--neutral-light); color: var(--neutral); }
.section-insight { font-size: 10px; color: #aaa; margin-left: auto; font-style: italic; }

/* CARDS */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 10px; }

.wx-card { background: #fff; border: 1px solid var(--warm-border); border-radius: 3px; overflow: hidden; transition: box-shadow 0.14s, transform 0.14s; }
.wx-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.07); transform: translateY(-1px); }
.wx-card.upside { border-top: 3px solid var(--green); }
.wx-card.downside { border-top: 3px solid var(--red); }
.wx-card.neutral { border-top: 3px solid var(--warm-border); }

.card-head { padding: 11px 13px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--warm-mid); }
.card-name { font-family: var(--serif); font-size: 14px; font-weight: 300; }
.card-sub { font-size: 10px; color: #aaa; margin-top: 2px; }
.sig-tag { font-family: var(--mono); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 7px; border-radius: 2px; flex-shrink: 0; font-weight: 500; }
.sig-tag.upside { background: var(--green-light); color: var(--green); }
.sig-tag.downside { background: var(--red-light); color: var(--red); }
.sig-tag.neutral { background: var(--neutral-light); color: var(--neutral); }

.wx-cols { display: grid; grid-template-columns: 1fr 1fr; }
.wx-col { padding: 10px 13px; }
.wx-col:first-child { border-right: 1px solid var(--warm-mid); }
.wx-col-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; margin-bottom: 6px; }
.wx-col-date { font-size: 9px; color: #ccc; display: block; margin-top: 1px; }
.wx-main { display: flex; align-items: center; gap: 7px; }
.wx-icon { font-size: 18px; line-height: 1; }
.wx-temp { font-family: var(--serif); font-size: 20px; font-weight: 300; color: var(--ink); }
.wx-range { font-size: 10px; color: #bbb; margin-top: 1px; }
.wx-desc { font-size: 10px; color: #888; margin-top: 3px; }
.wx-chips { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.wx-chip { font-size: 9px; background: var(--warm-mid); border-radius: 2px; padding: 2px 5px; color: #888; }

.insight-bar { padding: 7px 13px; border-top: 1px solid var(--warm-mid); font-size: 10px; line-height: 1.4; }
.insight-bar.upside { background: var(--green-light); color: var(--green); }
.insight-bar.downside { background: var(--red-light); color: var(--red); }
.insight-bar.neutral { background: var(--neutral-light); color: var(--neutral); }

.no-results { text-align: center; padding: 40px 20px; color: #ccc; font-size: 11px; }
.card-footer { padding: 8px 14px; border-top: 1px solid var(--warm-mid); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.hourly-btn { font-size: 10px; color: var(--neutral); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 4px 9px; border: 0.5px solid var(--warm-border); border-radius: 4px; background: transparent; cursor: pointer; letter-spacing: 0.3px; flex: 1; transition: all 0.12s; }
.hourly-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--warm-mid); }
.footer-divider { width: 1px; height: 20px; background: var(--warm-border); flex-shrink: 0; }
.btn-label { font-size: 9px; color: #aaa; display: block; margin-bottom: 3px; text-align: center; letter-spacing: 0.3px; }
.time-periods { padding: 6px 13px 8px; display: flex; flex-wrap: wrap; gap: 5px; border-top: 1px solid var(--warm-mid); }
.time-pill { font-size: 10px; background: var(--warm-mid); border-radius: 3px; padding: 3px 8px; color: var(--neutral); display: inline-flex; align-items: center; gap: 4px; }
.wx-card.downside .time-pill { background: var(--red-light); color: var(--red); }
.wx-card.upside .time-pill { background: var(--green-light); color: var(--green); }

/* SKELETON */
.skel { background: linear-gradient(90deg, var(--warm-mid) 25%, var(--warm-border) 50%, var(--warm-mid) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 2px; display: inline-block; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* COMP INFO */
.comp-info-bar { background: #163829; color: #666; font-size: 10px; padding: 5px 32px; letter-spacing: 0.3px; }
.comp-info-bar span { color: #e8c56a; }

/* ── MOBILE RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 768px) {
  .masthead { padding: 0 16px; flex-wrap: wrap; }
  .masthead-right { width: 100%; border-top: 1px solid #2D6A4F; justify-content: space-around; }
  .mstat { padding: 8px 12px; border-left: none; border-right: none !important; }
  .masthead-title { font-size: 18px; }

  .date-panel { padding: 10px 16px; gap: 8px; }
  .quick-chips { gap: 4px; }
  .chip { padding: 5px 9px; font-size: 9px; }
  .divider-v { display: none; }
  .custom-date-wrap { width: 100%; }
  .custom-date-wrap input[type="date"] { flex: 1; }
  .clear-all-btn { margin-left: 0; }

  .selected-dates-bar { padding: 6px 16px; gap: 6px; }

  .toolbar { padding: 6px 16px; gap: 6px; }
  .market-pills { gap: 4px; }
  .mpill { padding: 4px 8px; font-size: 9px; }
  .view-toggle { width: 100%; }
  .vtoggle { flex: 1; text-align: center; font-size: 9px; padding: 5px 4px; }
  .refresh-btn { width: 100%; text-align: center; }

  .sc-num { font-size: 32px; }
  .sc-desc { font-size: 9px; }

  .day-tabs-wrap { padding: 0 16px; }

  .content { padding: 14px 16px; }
  .card-grid { grid-template-columns: 1fr; }

  .comp-info-bar { padding: 5px 16px; font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .masthead-left { padding: 14px 0 8px; }
}
@media (max-width: 420px) {
  .sc-num { font-size: 26px; }
  .chip { padding: 4px 7px; font-size: 9px; }
  .card-head { flex-wrap: wrap; gap: 6px; }
}
</style>
</head>

  </div>

      <div class="mstat-label">Neutral</div>
    </div>

  </div>
</div>
<div class="comp-info-bar" id="compInfoBar">Select a date to begin</div>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

<!-- DATE SELECTOR -->
<div class="date-panel">

    <button class="chip" id="chip--3" onclick="selectSingleDate(-3)">-3 days</button>
    <button class="chip" id="chip--2" onclick="selectSingleDate(-2)">-2 days</button>
    <button class="chip" id="chip--1" onclick="selectSingleDate(-1)">Yesterday</button>

    <button class="chip" id="chip-1" onclick="selectSingleDate(1)">Tomorrow</button>
    <button class="chip" id="chip-3" onclick="selectSingleDate(3)">+3 days</button>

  </div>
</div>

<!-- MARKET FILTER + VIEW -->
<div class="toolbar toolbar-row1">
  <div class="market-pills" id="marketPills"></div>
  <div class="meal-pills">
    <button class="mpill active" id="meal-all" onclick="setMealFilter('all')">All Day</button>
    <button class="mpill" id="meal-lunch" onclick="setMealFilter('lunch')">Lunch</button>
    <button class="mpill" id="meal-happy" onclick="setMealFilter('happy')">Happy Hour</button>
    <button class="mpill" id="meal-dinner" onclick="setMealFilter('dinner')">Dinner</button>
  </div>
</div>
<div class="toolbar toolbar-row2">
  <div class="view-toggle">
    <button class="vtoggle active" id="vt-upside" onclick="setView('upside')">Upside</button>
    <button class="vtoggle" id="vt-downside" onclick="setView('downside')">Downside</button>
    <button class="vtoggle" id="vt-neutral" onclick="setView('neutral')">Neutral</button>
    <button class="vtoggle" id="vt-all" onclick="setView('all')">All</button>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="refreshCurrent()">↺ Refresh</button>
</div>

<!-- SCOREBOARD -->


<!-- DAY TABS (shown when multiple dates selected) -->
<div class="day-tabs-wrap hidden" id="dayTabsWrap"></div>

<!-- MAIN -->
<div class="content" id="mainContent">
  <div class="empty-prompt">
    <div class="empty-prompt-icon">☀</div>
    <div class="empty-prompt-text">
      <strong>Pick a date above to get started</strong><br>
      Use quick chips or enter a custom date — compare as many days as you like
    </div>
  </div>
</div>

const WMO = {
  0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
  45:"Foggy",48:"Rime fog",51:"Light drizzle",53:"Moderate drizzle",55:"Dense drizzle",
  61:"Light rain",63:"Moderate rain",65:"Heavy rain",71:"Light snow",73:"Moderate snow",
  75:"Heavy snow",77:"Snow grains",80:"Light showers",81:"Moderate showers",82:"Violent showers",
  85:"Light snow showers",86:"Heavy snow showers",95:"Thunderstorm",96:"Thunderstorm + hail",99:"Severe thunderstorm"
};
const ICON = {
  0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌦",55:"🌧",
  61:"🌧",63:"🌧",65:"🌧",71:"❄️",73:"❄️",75:"❄️",77:"❄️",
  80:"🌦",81:"🌧",82:"⛈",85:"🌨",86:"🌨",95:"⛈",96:"⛈",99:"⛈"
};

// Weather condition symbols
const WX_SYMBOL = {
  rain: '🌧', drizzle: '🌦', snow: '❄️', storm: '⛈', wind: '💨', fog: '🌫'
};

function getWeatherSymbol(wmo, wind) {
  if (wmo >= 95) return WX_SYMBOL.storm;
  if ((wmo >= 71 && wmo <= 77) || wmo >= 85) return WX_SYMBOL.snow;
  if (wmo >= 61 || (wmo >= 80 && wmo <= 82)) return WX_SYMBOL.rain;
  if (wmo >= 51) return WX_SYMBOL.drizzle;
  if (wmo === 45 || wmo === 48) return WX_SYMBOL.fog;
  if (wind && wind >= 50) return WX_SYMBOL.wind;
  return '';
}

// Estimate meal period impact from daily precipitation_hours
function getMealImpact(wmo, precip, precipHours, wind) {
  if (!isBad(wmo, precip, wind)) return null;
  const ph = precipHours || 0;
  const sym = getWeatherSymbol(wmo, wind);

  const allPeriods = [
    { key: 'lunch',  label: 'Lunch (11am–2:59pm)', hrs: 4 },
    { key: 'happy',  label: 'Happy Hour (3pm–6pm)', hrs: 3 },
    { key: 'dinner', label: 'Dinner (6pm–10pm)',    hrs: 4 }
  ];

  // Filter to active meal filter
  const periods = activeMealFilter === 'all'
    ? allPeriods
    : allPeriods.filter(p => p.key === activeMealFilter);

  // If no precip hours recorded, flag all filtered periods conservatively
  if (ph === 0) return periods.map(p => ({ label: p.label, sym }));

  // Distribute proportionally — flag if expected rain hours >= threshold
  const rate = ph / 24;
  const result = periods.filter(p => (rate * p.hrs) >= 0.4).map(p => ({ label: p.label, sym }));
  if (result.length === 0) return [{ label: periods[0].label, sym }];
  return result;
}

function isBad(wmo, precip, wind) {
  // Only flag genuinely disruptive conditions — overcast/cloudy/fog are fine for traffic
  // Rain, drizzle, snow, thunderstorms = bad
  if (wmo >= 51) return true;
  // Meaningful precipitation even if WMO didn't catch it
  if (parseFloat(precip) > 0.1) return true;
  // Dangerously high winds (50+ mph)
  if (wind && parseFloat(wind) >= 50) return true;
  // Clear, mainly clear, partly cloudy (0-2), overcast (3), fog (45,48) all count as fine
  return false;
}
function signal(t, c) {
  const gt = !isBad(t.wmo, t.precip, t.wind), gc = !isBad(c.wmo, c.precip, c.wind);
  if (gt && !gc) return 'upside';
  if (!gt && gc) return 'downside';
  return 'neutral';
}
function insight(sig, t, c) {
  const td = WMO[t.wmo] || 'conditions', cd = WMO[c.wmo] || 'conditions';
  if (sig === 'upside') return `${td} today vs ${cd.toLowerCase()} on comp — sales tailwind`;
  if (sig === 'downside') return `${td} today vs ${cd.toLowerCase()} on comp — sales headwind`;
  const both = !isBad(t.wmo,t.precip,t.wind) && !isBad(c.wmo,c.precip,c.wind);
  return both ? 'Similar conditions both days — no weather variance expected' : 'Similar conditions YOY — weather neutral';
}

function isoDate(d) { return d.toISOString().split('T')[0]; }
function fmtShort(iso) {
  const d = new Date(iso+'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function fmtFull(iso) {
  const d = new Date(iso+'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function getCompDate(iso) {
  const d = new Date(iso+'T12:00:00');
  const comp = new Date(d);
  comp.setFullYear(comp.getFullYear()-1);
  const diff = d.getDay() - comp.getDay();
  comp.setDate(comp.getDate()+diff);
  return isoDate(comp);
}
function offsetDate(n) {
  const d = new Date();
  d.setDate(d.getDate()+n);
  return isoDate(d);
}

function refreshCurrent() {
  if (!activeDate) return;
  // Clear memory cache
  Object.keys(weatherCache).forEach(k => { if (k.startsWith(activeDate+':')) delete weatherCache[k]; });
  // Clear localStorage cache for this date
  try {
    const comp = getCompDate(activeDate);
    localStorage.removeItem('hd_wx_' + activeDate);
    localStorage.removeItem('hd_wx_comp_' + comp);
    // Also clear any old keys older than 24h
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith('hd_wx_')) {
        try { const d = JSON.parse(localStorage.getItem(k)); if (d.ts && Date.now() - d.ts > 86400000) localStorage.removeItem(k); } catch(e) {}
      }
    });
  } catch(e) {}
  loadMissingDates();
  render();
}

function parseWeatherResult(daily) {
  return {
    high:   Math.round(daily.temperature_2m_max[0]),
    low:    Math.round(daily.temperature_2m_min[0]),
    wmo:    daily.weathercode[0],
    precip: (daily.precipitation_sum[0] || 0).toFixed(2),
    wind:   Math.round(daily.windspeed_10m_max[0])
  };
}

function daysFromToday(iso) {
  if (!iso || typeof iso !== 'string') return 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(iso+'T12:00:00');
  if (isNaN(target.getTime())) return 0;
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}
function isFuture(iso) { return daysFromToday(iso) > 0; }
function isPastDate(iso) { return daysFromToday(iso) < 0; }

async function fetchBatchUrl(lats, lons, dateStr, forceArchive) {
  const fields = 'temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,windspeed_10m_max';
  const common = `&daily=${fields}&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone=auto`;
  const offset = daysFromToday(dateStr);
  let base;
  // fetchBatchUrl is archive-only — forecast API doesn't support multi-location batch
  base = `https://archive-api.open-meteo.com/v1/archive?latitude=${lats}&longitude=${lons}&start_date=${dateStr}&end_date=${dateStr}${common}`;
  const resp = await fetch(base);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const json = await resp.json();
  return Array.isArray(json) ? json : [json];
}

async function fetchForDate(iso) {
  const comp = getCompDate(iso);
  const offset = daysFromToday(iso);
  const isPast = offset < 0;
  const fDays = Math.max(1, offset + 1);

  const missing = LOCATIONS.filter(l => !weatherCache[iso+':'+l.name+l.zip]);
  if (missing.length === 0) return;

  // Check localStorage cache first — avoid API calls if data fetched today
  const storageKey = 'hd_wx_' + iso;
  const compStorageKey = 'hd_wx_comp_' + comp;
  const cacheExpiry = 30 * 60 * 1000; // 30 minutes
  const now = Date.now();

  try {
    const cached = localStorage.getItem(storageKey);
    const cachedComp = localStorage.getItem(compStorageKey);
    if (cached && cachedComp) {
      const parsed = JSON.parse(cached);
      const parsedComp = JSON.parse(cachedComp);
      if (parsed.ts && (now - parsed.ts) < cacheExpiry) {
        // Use cached data
        missing.forEach((loc, idx) => {
          const key = iso+':'+loc.name+loc.zip;
          if (parsed.data[idx] && parsedComp.data[idx]) {
            weatherCache[key] = {
              target:   parsed.data[idx],
              comp:     parsedComp.data[idx],
              compDate: comp
            };
          }
        });
        document.getElementById('progressFill').style.width = '100%';
        setTimeout(() => document.getElementById('progressFill').style.width = '0%', 300);
        if (activeDate === iso) render();
        return;
      }
    }
  } catch(e) { /* localStorage unavailable, proceed with fetch */ }

  document.getElementById('progressFill').style.width = '10%';

  const lats = LOCATIONS.map(l => l.lat).join(',');
  const lons  = LOCATIONS.map(l => l.lon).join(',');
  // Use customer CDN for faster US response
  const baseHost = isPast ? 'archive-api.open-meteo.com' : 'api.open-meteo.com';
  const archHost = 'archive-api.open-meteo.com';
  const dailyFields = 'temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,windspeed_10m_max,precipitation_hours';
  const units = '&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone=auto';

  const targetUrl = isPast
    ? `https://${baseHost}/v1/archive?latitude=${lats}&longitude=${lons}&start_date=${iso}&end_date=${iso}&daily=${dailyFields}${units}`
    : `https://${baseHost}/v1/forecast?latitude=${lats}&longitude=${lons}&daily=${dailyFields}${units}&forecast_days=${fDays}`;
  const compUrl = `https://${archHost}/v1/archive?latitude=${lats}&longitude=${lons}&start_date=${comp}&end_date=${comp}&daily=${dailyFields}${units}`;

  function extractDay(daily, idx) {
    const i = Math.max(0, idx || 0);
    return {
      high:   Math.round(daily.temperature_2m_max[i]),
      low:    Math.round(daily.temperature_2m_min[i]),
      wmo:    daily.weathercode[i],
      precip: (daily.precipitation_sum[i] || 0).toFixed(2),
      wind:   Math.round(daily.windspeed_10m_max[i]),
      precipHours: daily.precipitation_hours ? (daily.precipitation_hours[i] || 0) : 0
    };
  }

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000); // 8s timeout

    const [tResp, cResp] = await Promise.all([
      fetch(targetUrl, { signal: controller.signal }),
      fetch(compUrl,   { signal: controller.signal })
    ]);
    clearTimeout(timeout);

    if (!tResp.ok) throw new Error('Target ' + tResp.status);
    if (!cResp.ok) throw new Error('Comp ' + cResp.status);

    const [tJson, cJson] = await Promise.all([tResp.json(), cResp.json()]);
    const tArr = Array.isArray(tJson) ? tJson : [tJson];
    const cArr = Array.isArray(cJson) ? cJson : [cJson];

    const targetData = [];
    const compData   = [];

    LOCATIONS.forEach((loc, idx) => {
      try {
        const t = extractDay(tArr[idx].daily, isPast ? 0 : offset);
        const c = extractDay(cArr[idx].daily, 0);
        targetData[idx] = t;
        compData[idx]   = c;
        weatherCache[iso+':'+loc.name+loc.zip] = { target: t, comp: c, compDate: comp };
      } catch(e) { console.warn('Parse error', loc.name, e); }
    });

    // Save to localStorage for instant loads on refresh
    try {
      localStorage.setItem(storageKey,     JSON.stringify({ ts: now, data: targetData }));
      localStorage.setItem(compStorageKey, JSON.stringify({ ts: now, data: compData }));
    } catch(e) { /* storage full or unavailable */ }

    document.getElementById('progressFill').style.width = '100%';
    if (activeDate === iso) render();

  } catch(e) {
    console.warn('Primary fetch failed:', e.message);
    // Last resort: fetch in 3 parallel chunks
    const CHUNK = 17;
    const chunks = [];
    for (let i = 0; i < LOCATIONS.length; i += CHUNK) chunks.push(LOCATIONS.slice(i, i + CHUNK));

    await Promise.all(chunks.map(async chunk => {
      const cLats = chunk.map(l => l.lat).join(',');
      const cLons = chunk.map(l => l.lon).join(',');
      const tUrl = isPast
        ? `https://archive-api.open-meteo.com/v1/archive?latitude=${cLats}&longitude=${cLons}&start_date=${iso}&end_date=${iso}&daily=${dailyFields}${units}`
        : `https://api.open-meteo.com/v1/forecast?latitude=${cLats}&longitude=${cLons}&daily=${dailyFields}${units}&forecast_days=${fDays}`;
      const cUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${cLats}&longitude=${cLons}&start_date=${comp}&end_date=${comp}&daily=${dailyFields}${units}`;
      try {
        const [tr, cr] = await Promise.all([fetch(tUrl), fetch(cUrl)]);
        const [td, cd] = await Promise.all([tr.json(), cr.json()]);
        const tA = Array.isArray(td) ? td : [td];
        const cA = Array.isArray(cd) ? cd : [cd];
        chunk.forEach((loc, i) => {
          try {
            weatherCache[iso+':'+loc.name+loc.zip] = {
              target: extractDay(tA[i].daily, isPast ? 0 : offset),
              comp:   extractDay(cA[i].daily, 0),
              compDate: comp
            };
          } catch(e2) { console.warn('Chunk parse error', loc.name); }
        });
      } catch(e2) { console.warn('Chunk failed:', e2.message); }
    }));
    if (activeDate === iso) render();
  }

  setTimeout(() => { document.getElementById('progressFill').style.width = '0%'; }, 300);
  if (activeDate === iso) render();
}


function loadMissingDates() {
  selectedDates.forEach(iso => {
    const loaded = LOCATIONS.filter(l => weatherCache[iso+':'+l.name+l.zip]).length;
    if (loaded < LOCATIONS.length) fetchForDate(iso);
  });
}

function getDateData(iso) {
  const filtered = activeMarket === 'All' ? LOCATIONS : LOCATIONS.filter(l=>l.market===activeMarket);
  const result = { upside:[], downside:[], neutral:[], all:[] };
  filtered.forEach(loc => {
    const d = weatherCache[iso+':'+loc.name+loc.zip];
    if (!d) return;
    const sig = signal(d.target, d.comp);
    result[sig].push({loc, data:d, sig});
    result.all.push({loc, data:d, sig});
  });
  return result;
}

function render() {
  updateSelectedDateTags();

  // Day tabs
  const tabsWrap = document.getElementById('dayTabsWrap');
  if (selectedDates.length <= 1) {
    tabsWrap.classList.add('hidden');
  } else {
    tabsWrap.classList.remove('hidden');
    tabsWrap.innerHTML = selectedDates.map(iso => {
      const d = getDateData(iso);
      return `<button class="day-tab${iso===activeDate?' active':''}" onclick="setActiveDate('${iso}')">
        ${fmtShort(iso)}
        <span class="tab-pill tab-up">↑${d.upside.length}</span>
        <span class="tab-pill tab-down">↓${d.downside.length}</span>
      </button>`;
    }).join('');
  }

  if (!activeDate || selectedDates.length === 0) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-prompt">
        <div class="empty-prompt-icon">☀</div>
        <div class="empty-prompt-text"><strong>Pick a date above to get started</strong><br>Use quick chips or enter a custom date</div>
      </div>`;
    document.getElementById('compInfoBar').textContent = 'Select a date to begin';
    ['hdrUp','hdrDown','hdrNeut','hdrTotal'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent='—'; });
    return;
  }

  const loaded = LOCATIONS.filter(l=>weatherCache[activeDate+':'+l.name+l.zip]).length;
  if (loaded === 0) {
    document.getElementById('mainContent').innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Loading weather data...</span></div>`;
    document.getElementById('compInfoBar').textContent = 'Fetching data...';
    return;
  }

  const compIso = getCompDate(activeDate);
  document.getElementById('compInfoBar').innerHTML = `Showing: <span>${fmtFull(activeDate)}</span> &nbsp;·&nbsp; Comp day (same DOW -1yr): <span>${fmtFull(compIso)}</span> &nbsp;·&nbsp; ${loaded}/${LOCATIONS.length} locations loaded`;

  const d = getDateData(activeDate);
  document.getElementById('hdrUp').textContent = d.upside.length;
  document.getElementById('hdrDown').textContent = d.downside.length;
  document.getElementById('hdrNeut').textContent = d.neutral.length;
  document.getElementById('hdrTotal').textContent = d.all.length;

  const toRender = activeView === 'all'
    ? [{label:'Upside — good today, bad comp',cls:'up',items:d.upside},{label:'Downside — bad today, good comp',cls:'down',items:d.downside},{label:'Neutral — similar conditions',cls:'neut',items:d.neutral}]
    : [{label: activeView==='upside'?'Upside locations':activeView==='downside'?'Downside locations':'Neutral locations', cls: activeView==='upside'?'up':activeView==='downside'?'down':'neut', items:d[activeView]}];

  let html = '';
  toRender.forEach(section => {
    if (section.items.length === 0 && activeView !== 'all') {
      html += `<div class="no-results">No ${activeView} locations for this date &amp; market filter.</div>`; return;
    }
    if (section.items.length === 0) return;
    html += `<div class="section-block">
      <div class="section-head">
        <span class="section-eye ${section.cls}">${section.label}</span>
        <span class="section-count ${section.cls}">${section.items.length}</span>
      </div>
      <div class="card-grid">
        ${section.items.map(({loc,data,sig})=>cardHTML(loc,data,sig)).join('')}
      </div>
    </div>`;
  });

  document.getElementById('mainContent').innerHTML = html || '<div class="no-results">No data yet — loading...</div>';
}

// Auto-load today on open
window.addEventListener('load', () => {
  setTimeout(() => selectSingleDate(0), 100);
});

// Track what day we loaded on
let loadedOnDate = isoDate(new Date());

// Check every 60 seconds: roll to new day OR refresh weather every 30 min
setInterval(() => {
  const todayIso = isoDate(new Date());

  // New day rolled over
  if (todayIso !== loadedOnDate) {
    loadedOnDate = todayIso;

    // Switch to the new day automatically
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    const chip0 = document.getElementById('chip-0');
    if (chip0) chip0.classList.add('active');
    setActiveDate(todayIso);

    // Clear yesterday's forecast cache (historical data won't change)
    const yesterday = isoDate(new Date(Date.now() - 86400000));
    Object.keys(weatherCache).forEach(k => {
      if (k.startsWith(yesterday+':')) delete weatherCache[k];
    });

    syncViewUI();
    render();
    return;
  }

  // Same day: refresh today's live weather every 30 minutes
  const now = new Date();
  if (now.getMinutes() % 30 === 0 && now.getSeconds() < 90) {
    if (selectedDates.includes(todayIso)) {
      Object.keys(weatherCache).forEach(k => { if (k.startsWith(todayIso+':')) delete weatherCache[k]; });
      fetchForDate(todayIso);
    }
  }
}, 60 * 1000);
</script>
</body>
</html>
